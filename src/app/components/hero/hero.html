<section class="hero-full">
  <div class="hero-overlay"></div>
  <div class="container hero-content-center">

    <!-- Heading -->
    <h1 #heroText>
      Find Rooms, PGs &amp; Flats<br>
      <span class="hero-accent">Without Brokerage</span>
    </h1>

    <!-- Sub-headline -->
    <p class="hero-sub">Direct Owner Contact. No Brokerage.</p>

    <!-- Trust badges -->
    <div class="hero-badges">
      <div class="badge-pill">
        <mat-icon>home_work</mat-icon>
        <span>Owner listings</span>
      </div>
      <span class="badge-sep">|</span>
      <div class="badge-pill">
        <mat-icon>security</mat-icon>
        <span>Safety tips built-in</span>
      </div>
    </div>

    <!-- Search bar -->
    <app-search-bar></app-search-bar>

  </div>
</section>

<!-- Stats strip — sits just below hero -->
<div class="hero-stats-strip">
  <div class="stat-item">
    <mat-icon class="stat-icon">home</mat-icon>
    <div class="stat-text">
      <span class="stat-number">200+</span>
      <span class="stat-label">Listings</span>
    </div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <mat-icon class="stat-icon">group</mat-icon>
    <div class="stat-text">
      <span class="stat-number">500+</span>
      <span class="stat-label">Users</span>
    </div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <mat-icon class="stat-icon">location_on</mat-icon>
    <div class="stat-text">
      <span class="stat-number stat-city">
        <span class="city-item">Prayagraj</span>
        <span class="city-item">Varanasi</span>
        <span class="city-item">Pune</span>
      </span>
      <span class="stat-label">Your City</span>
     
    </div>
  </div>
</div>
