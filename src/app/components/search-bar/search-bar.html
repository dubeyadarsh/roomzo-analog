<form class="rz-search-pill" (submit)="search($event)">
  
  <div class="input-group">
    <mat-icon class="search-icon">search</mat-icon>
    <input type="search" 
           [formControl]="searchControl" 
           [matAutocomplete]="auto" 
           placeholder="Search locality, village, city..." 
           aria-label="Search">
           
    <mat-autocomplete #auto="matAutocomplete" 
                      [displayWith]="displayCity" 
                      (optionSelected)="onCitySelected($event)"
                      class="custom-autocomplete-panel">
      <mat-option *ngFor="let loc of filteredCities" [value]="loc">
         <mat-icon style="font-size: 18px; color: #94a3b8; vertical-align: middle; margin-right: 4px;">place</mat-icon>
         {{ displayCity(loc) }}
      </mat-option>
    </mat-autocomplete>
  </div>

  <div class="divider hide-mobile"></div>

  <div class="filter-group">
    <mat-select class="custom-mat-select" [formControl]="propertyTypeControl" placeholder="Property Type" panelClass="custom-select-panel">
      <mat-option value="Any">Any Type</mat-option>
      <mat-option value="Flat">Flat</mat-option>
      <mat-option value="PG">PG</mat-option>
      <mat-option value="Room">Room</mat-option>
    </mat-select>
  </div>

  <div class="divider hide-mobile"></div>

  <div class="filter-group">
    <mat-select class="custom-mat-select" [formControl]="budgetControl" placeholder="Budget" panelClass="custom-select-panel">
      <mat-option [value]="50000">Any (Up to ₹50k)</mat-option>
      <mat-option [value]="5000">Up to ₹5k</mat-option>
      <mat-option [value]="10000">Up to ₹10k</mat-option>
      <mat-option [value]="20000">Up to ₹20k</mat-option>
    </mat-select>
  </div>

  <button type="submit" class="btn-primary search-btn">Search</button>
</form>
